name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}  # For remotes access
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24 to suppress deprecation warning
    steps:
      - uses: actions/checkout@v4  # Updated to v4 (Node 24)

      - uses: r-lib/actions/setup-pandoc@v2  # v2 is still current, compatible

      - uses: r-lib/actions/setup-r@v2  # v2 is current, compatible
        with:
          r-version: '4.4'  # Match your R version
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck"))
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}

      - name: Check
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "error")
        shell: Rscript {0}
